<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>派单助手 - 师傅端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    /* 登录页 */
    #login-page {
      max-width: 380px;
      width: 100%;
    }
    .app-icon {
      width: 72px;
      height: 72px;
      background: #ec7210;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 12px;
    }
    .app-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .app-subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 36px;
    }
    .input-group {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 16px;
    }
    .input-label {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 10px;
      text-align: left;
    }
    .phone-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 18px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    .phone-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 1px; }
    .phone-input:focus { border-color: #ec7210; }
    .enter-btn {
      width: 100%;
      padding: 15px;
      background: #ec7210;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
    }
    .enter-btn:active { transform: scale(0.98); }
    .enter-btn:disabled { background: rgba(236,114,16,0.4); cursor: not-allowed; }
    .hint-text {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-top: 20px;
    }

    /* 聊天页 */
    #chat-page {
      display: none;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    /* 隐藏推荐问题按钮 */
    [class*="suggestion"], [class*="recommended"], [class*="quick-reply"],
    [class*="question-item"], [class*="prompt-item"] {
      display: none !important;
    }

    #chat-loading {
      display: inline-block;
      background: rgba(236,114,16,0.9);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      animation: pulse 1.5s ease-in-out infinite;
      margin-top: 12px;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes bounce-arrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(14px); } }
  </style>
  <!-- JSRSASIGN loaded from same origin -->
  <script src="./jsrsasign-all-min.js"></script>
  <!-- Coze Chat SDK (国内CDN) -->
  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>
</head>
<body>

  <!-- 登录页 -->
  <div id="login-page">
    <div class="app-icon">🔧</div>
    <div class="app-title">派单助手</div>
    <div class="app-subtitle">师傅端 · 看单 · 出发 · 完工</div>

    <div class="input-group">
      <div class="input-label">输入您的手机号</div>
      <input class="phone-input" id="phoneInput" type="tel" maxlength="11" placeholder="手机号即您的工号" inputmode="numeric" pattern="[0-9]*">
      <button class="enter-btn" id="enterBtn" disabled>进入工作台</button>
    </div>

    <div class="hint-text">首次使用？直接输入手机号即可</div>
  </div>

  <!-- 工作台引导页 -->
  <div id="chat-page" style="display:none;">
    <div class="app-icon">🔧</div>
    <div class="app-title">已进入工作台</div>
    <div class="app-subtitle">点击右下角气泡，开始对话</div>
    <div style="margin-top:32px; animation: bounce-arrow 2s ease-in-out infinite; font-size:48px;">👇</div>
    <div style="margin-top:16px; font-size:13px; color:rgba(255,255,255,0.35);">查看工单 · 接单 · 上报完工</div>
  </div>


  <script>
    // === OAuth JWT Configuration ===
    var ISS = '1199212001020';
    var KID = 'tsfTukA85NQ4TDqx3uGim2L_CfxqtwWtQXguJGaEsJU';
    var BOT_ID = '7652596501499772968'; // 师傅端Bot
    var PRIVATE_KEY = '-----BEGIN PRIVATE KEY-----\n' +
      'MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQCxZgtRZP6wS2oy\n' +

      'tHCeYkExgZeO2EMeIk9bp+GioxC4D12mlHZZxhEfmOxQPka6UFuIIZG8a4xnPVVW\n' +
      'uVOOmizRBeoYxAIdbLukKBJgmRWjhbXdVElGLuZSoEDEuy1laFMuhPwUmMne9VBM\n' +
      'o8iDoT6bF+TD3hu86bqwhnG8M/p5ycqaeMaDlsq/xhLaFuvzGI/QOlYsYGm/Ax+h\n' +
      'nE1I+63RAgMBAAECggEAA0zeQmjpfFJYhEsT4z2mJ2s+8QLS+MxaREu8ovkPjds2\n' +

      'G+q6rNkfdOdDWIPL67aXo8iXtLgDjXJlvze2deWG7WwUq6CU4z2mX21ApfcocX0h\n' +
      '7h0AHVWZna5960DA8+HJMBaPN4L60ES3Py1ojr+yD6sPeL62Oq6lGe3ZhZiNaVJI\n' +

      'vCP+57T4M6pAEjiPfJRewmc=\n' +

    var phoneInput = document.getElementById('phoneInput');
    var enterBtn = document.getElementById('enterBtn');
    var loginPage = document.getElementById('login-page');
    var chatPage = document.getElementById('chat-page');

    // 手机号验证
    phoneInput.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      enterBtn.disabled = this.value.length !== 11;
    });

    // 回车提交
    phoneInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !enterBtn.disabled) {
        enterBtn.click();
      }
    });

    // === Sign JWT with RS256 ===
    function signJWT(sessionName) {
      var header = { alg: 'RS256', typ: 'JWT', kid: KID };
      var now = Math.floor(Date.now() / 1000);
      var payload = {
        iss: ISS,
        aud: 'api.coze.cn',
        iat: now,
        exp: now + 3600,
        jti: Math.random().toString(36).substr(2) + Date.now().toString(36),
        session_name: sessionName
      };
      return KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), PRIVATE_KEY);
    }

    // === Exchange JWT for OAuth access token ===
    async function getAccessToken(jwt) {
      var resp = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + jwt,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
          duration_seconds: 86399
        })
      });
      var json = await resp.json();
      var token = json.access_token || (json.data && json.data.access_token);
      if (!token) {
        console.error('Token exchange failed:', json);
        throw new Error('No access token: ' + (json.msg || JSON.stringify(json)));
      }
      return token;
    }

    // 进入聊天
    enterBtn.addEventListener('click', async function() {
      var phone = phoneInput.value.trim();
      if (phone.length !== 11) return;

      enterBtn.disabled = true;
      enterBtn.textContent = '连接中...';

      try {
        // 检查JSRSASIGN是否加载
        if (typeof KJUR === 'undefined') {
          throw new Error('加密库未加载，请刷新页面重试');
        }

        // 用手机号作为session_name实现会话隔离
        var sessionName = 'worker_' + phone;
        var jwt = signJWT(sessionName);
        var accessToken = await getAccessToken(jwt);

        loginPage.style.display = 'none';
        chatPage.style.display = 'block';

        // 直接初始化Coze Chat SDK（已在head预加载）
        new CozeWebSDK.WebChatClient({
          config: {
            type: 'bot',
            bot_id: BOT_ID,
          },
          auth: {
            type: 'token',
            token: accessToken,
            onRefreshToken: async function() {
              var newJwt = signJWT(sessionName);
              return await getAccessToken(newJwt);
            },
          },
          userInfo: {
            id: phone,
            nickname: '师傅' + phone.substr(-4),
          },
          ui: {
            base: {
              icon: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/chatsdk-logo.png',
              layout: 'mobile',
              lang: 'zh-CN',
              zIndex: 1000,
            },
            header: { isShow: true, isNeedClose: true },
            asstBtn: { isNeed: true },
            footer: { isShow: true, expressionText: '派单助手 · 师傅端' },
            chatBot: { title: '派单助手', uploadable: false, width: 390 },
          },
        });
      } catch (err) {
        console.error('Auth failed:', err);
        enterBtn.disabled = false;
        enterBtn.textContent = '进入工作台';
        alert('连接失败：' + err.message);
      }
    });
  </script>


</body>
</html>
